<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AttendX / HOD Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #c7d2fe);
        }

        .dashboard {
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
            animation: fadeUp 0.6s ease;
        }

        /* HEADER */

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: clamp(24px, 3vw, 34px);
            font-weight: 700;
            color: #4338ca;
        }

        /* 🔥 BUTTON */

        button {
            padding: 10px 16px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: 0.25s;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }

        /* 💧 RIPPLE */

        button span.ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: rippleAnim 0.6s linear;
            background: rgba(255, 255, 255, 0.6);
        }

        @keyframes rippleAnim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* 🌀 LOADING */

        button.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        button.loading::after {
            content: "";
            width: 16px;
            height: 16px;
            border: 3px solid white;
            border-top: 3px solid transparent;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        /* 🔥 HOD PANEL */

        .faculty-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
            border-left: 6px solid #4f46e5;
            animation: fadeUp 0.7s ease;
        }

        .faculty-panel h2 {
            margin: 0 0 8px;
            color: #3730a3;
            font-size: 24px;
        }

        .faculty-panel p {
            margin: 4px 0;
            font-size: 14px;
            color: #374151;
        }

        .faculty-stats {
            margin-top: 12px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
        }

        /* 🔥 CARDS */

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            transition: 0.25s;
            border: 1px solid rgba(0, 0, 0, 0.05);
            animation: fadeUp 0.8s ease;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 35px rgba(0, 0, 0, 0.12);
        }

        /* 🚀 PAGE EXIT */

        .page-exit {
            animation: pageOut 0.5s ease forwards;
        }

        @keyframes pageOut {
            to {
                opacity: 0;
                transform: translateY(-40px);
            }
        }

        /* ✨ ENTRY */

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

</head>

<body>

    <div class="dashboard">

        <div class="header-actions">
            <h1>AttendX / HOD Dashboard</h1>

            <div>
                <button onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="faculty-panel">

            <h2 id="hodName"></h2>
            <p id="hodDept"></p>

            <div class="faculty-stats">
                <p><strong>Total Courses:</strong> <span id="totalCourses"></span></p>
                <p><strong>Total Sections:</strong> <span id="totalSections"></span></p>
                <p><strong>Total Students:</strong> <span id="totalStudents"></span></p>
                <p><strong>Faculty Members:</strong> <span id="totalFaculty"></span></p>
            </div>

        </div>

        <div class="cards" id="courseCards"></div>

    </div>

    <script src="mockData.js"></script>
    <script src="hodData.js"></script>
    <script src="hod.js"></script>
    <script src="utils.js"></script>

</body>

</html>
