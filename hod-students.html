<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AttendX / HOD / Students</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: #f3f4f6;
        }

        .dashboard {
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
        }

        h1 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #111827;
        }

        /* BUTTONS */

        button {
            padding: 10px 14px;
            border-radius: 8px;
            border: none;
            background: #6366f1;
            color: white;
            cursor: pointer;
            transition: 0.25s;
            margin-top: 10px;
        }

        button:hover {
            background: #4f46e5;
        }

        .back-btn {
            background: #e5e7eb;
            color: #111827;
            margin-right: 10px;
        }

        .back-btn:hover {
            background: #d1d5db;
        }

        /* CARD */

        .card {
            background: white;
            padding: 18px;
            border-radius: 12px;
            margin-top: 15px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.05);
        }

        /* TABLE */

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.05);
        }

        th {
            background: #6366f1;
            color: white;
            font-weight: 500;
        }

        th,
        td {
            padding: 12px;
            text-align: center;
            font-size: 14px;
        }

        tbody tr:nth-child(even) {
            background: #f9fafb;
        }

        tbody tr:hover {
            background: #eef2ff;
        }
    </style>

</head>

<body>

    <div class="dashboard">

        <h1>AttendX / HOD Dashboard / Students Details</h1>

        <button class="back-btn" onclick="goBack()">← Go Back</button>
        <button onclick="exportClassReport()">Export Class Report</button>

        <div class="card">
            <p><strong>Department:</strong> <span id="department"></span></p>
            <p><strong>Program:</strong> <span id="program"></span></p>
            <p><strong>Semester:</strong> <span id="sem"></span></p>
            <p><strong>Section:</strong> <span id="section"></span></p>
        </div>

        <table>
            <thead>
                <tr id="tableHead">
                    <th>USN</th>
                    <th>Name</th>
                    <th>Parent Phone</th>
                </tr>
            </thead>
            <tbody id="studentRows"></tbody>
        </table>

    </div>

    <script src="mockData.js"></script>
    <script src="hod-students.js"></script>

</body>

</html>
