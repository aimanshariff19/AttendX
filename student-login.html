<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AttendX Students Login</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
        }

        body.login-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #5b3df5, #7c6cff);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CARD */

        .login-container {
            width: 320px;
            padding: 30px 22px;
            border-radius: 18px;
            text-align: center;

            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.2);

            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
            box-sizing: border-box;

            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-6px);
            }
        }

        .college-logo {
            width: 65px;
            margin-bottom: 10px;
        }

        .college-name {
            margin: 5px 0;
            font-size: 17px;
            font-weight: 600;
            color: white;
        }

        .college-location,
        .college-status {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.75);
        }

        .system-title {
            margin: 12px 0;
            font-size: 15px;
            color: #dcdcff;
        }

        /* INPUT */

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 14px;
            color: white;
            background: rgba(255, 255, 255, 0.15);
            box-sizing: border-box;
            transition: 0.25s;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.85);
        }

        input:focus {
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.4);
            outline: none;
            transform: scale(1.01);
        }

        /* PASSWORD */

        .password-field {
            position: relative;
        }

        .eye {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
        }

        /* BUTTON */

        button {
            width: 100%;
            padding: 12px;
            margin-top: 14px;
            border-radius: 10px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            font-size: 14px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: 0.25s;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }

        /* 💧 RIPPLE */

        button span.ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: rippleAnim 0.6s linear;
            background: rgba(255, 255, 255, 0.6);
        }

        @keyframes rippleAnim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* 🌀 LOADING */

        button.loading {
            pointer-events: none;
            opacity: 0.85;
        }

        button.loading::after {
            content: "";
            width: 18px;
            height: 18px;
            border: 3px solid white;
            border-top: 3px solid transparent;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        /* ERROR */

        #error {
            margin-top: 10px;
            color: #fecaca;
            font-size: 13px;
            font-weight: 500;
        }

        /* SHAKE */

        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-6px);
            }

            50% {
                transform: translateX(6px);
            }

            75% {
                transform: translateX(-6px);
            }

            100% {
                transform: translateX(0);
            }
        }

        /* PAGE EXIT */

        .page-exit {
            animation: pageOut 0.5s ease forwards;
        }

        @keyframes pageOut {
            to {
                opacity: 0;
                transform: scale(0.95) translateY(-20px);
            }
        }

        .input-error {
            border: 1px solid #f87171 !important;
            background: rgba(248, 113, 113, 0.15) !important;
        }
    </style>

</head>

<body class="login-page">

    <div class="login-container">

        <img src="assets/logo.png" class="college-logo">

        <h2 class="college-name">Atria Institute of Technology</h2>
        <p class="college-location">Hebbal, Bengaluru</p>
        <p class="college-status">(Autonomous Institution)</p>

        <h3 class="system-title">AttendX Student Portal</h3>

        <input type="text" id="studentId" placeholder="Student ID">

        <div class="password-field">
            <input type="password" id="password" placeholder="Password">
            <i id="eyeIcon" class="fa-solid fa-eye eye"></i>
        </div>

        <button id="loginBtn" onclick="studentLogin()">Login</button>

        <p id="error"></p>

    </div>

    <!-- <script src="mockData.js"></script> -->
    <!-- <script src="student-login.js"></script> -->
    <!-- <script src="utils.js"></script>  -->

</body>

</html>
