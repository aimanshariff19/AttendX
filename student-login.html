<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AttendX Students Login</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

    <div class="login-container">

        <img src="assets/logo.png" class="college-logo" alt="Atria Institute of Technology Logo">

        <h2 class="college-name">Atria Institute of Technology</h2>
        <p class="college-location">Hebbal, Bengaluru</p>
        <p class="college-status">(Autonomous Institution)</p>
        <h3 class="system-title">AttendX Student Portal</h3>

        <input type="text" id="studentId" placeholder="Student ID">

        <div class="password-field">
            <input type="password" id="password" placeholder="Password">
            <i id="eyeIcon" class="fa-solid fa-eye eye"></i>
        </div>

        <button onclick="studentLogin()">Login</button>

        <p id="error"></p>

    </div>

    <script src="mockData.js"></script>
    <script src="student-login.js"></script>
    <script src="utils.js"></script>

</body>

</html>
