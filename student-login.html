<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX Student Login</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page student">

    <div class="login-container">

        <img src="assets/logo.png" class="college-logo">

        <h2 class="college-name">Atria Institute of Technology</h2>
        <p class="college-location">Hebbal, Bengaluru</p>
        <p class="college-status">(Autonomous Institution)</p>

        <h3 class="system-title">AttendX Student Portal</h3>

        <!-- ✅ ADD FORM (SAFE) -->
        <form id="studentForm" onsubmit="return false;">

            <div class="input-group">
                <label>Student ID</label>
                <input type="text" id="studentId" placeholder=" " required>
            </div>

            <div class="input-group password-field">
                <label>Password</label>
                <input type="password" id="password" placeholder=" " required>
                <i id="eyeIcon" class="fa-solid fa-eye eye"></i>
            </div>

            <button id="loginBtn" type="button">Login</button>

        </form>

        <p id="error" class="error-text"></p>

    </div>

    <!-- 🔥 IMPORTANT ORDER -->
    <script src="mockData.js"></script>
    <script src="student-login.js"></script>

</body>

</html>
