<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX Student Login</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page student">

    <div class="login-container">

        <img src="assets/logo.png" class="college-logo">

        <h2 class="college-name">Atria Institute of Technology</h2>
        <p class="college-location">Hebbal, Bengaluru</p>
        <p class="college-status">(Autonomous Institution)</p>

        <h3 class="system-title">AttendX Student Portal</h3>

        <!-- STUDENT ID -->
        <div class="input-group">
            <input type="text" id="studentId" placeholder=" " required>
            <label>Student ID</label>
        </div>

        <!-- PASSWORD (FIXED) -->
        <div class="input-group password-field">
            <input type="password" id="password" placeholder=" " required>
            <label>Password</label>
            <i id="eyeIcon" class="fa-solid fa-eye eye"></i>
        </div>

        <button id="loginBtn">Login</button>

        <p id="error" class="error-text"></p>

    </div>

</body>

</html>
