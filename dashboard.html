<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Attendance</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #c7d2fe);
        }

        .dashboard {
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
        }

        h1 {
            font-size: 20px;
            color: #4338ca;
        }

        button {
            padding: 10px 14px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            cursor: pointer;
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 18px;
            border-radius: 14px;
            margin-top: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            line-height: 1.4;
        }

        /* 🔥 FIXED SPACING */

        .card p {
            margin: 4px 0;
            font-size: 14px;
            color: #374151;
            display: flex;
            justify-content: space-between;
        }

        .card p strong {
            color: #111827;
            font-weight: 500;
        }

        .card p span {
            color: #4338ca;
            font-weight: 500;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
        }

        th {
            background: #6366f1;
            color: white;
        }

        th,
        td {
            padding: 10px;
            text-align: center;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
        }

        .slider {
            position: absolute;
            background: #dc2626;
            border-radius: 24px;
            inset: 0;
            transition: .3s;
        }

        .slider:before {
            content: "";
            position: absolute;
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: .3s;
        }

        .toggle-switch input:checked+.slider {
            background: #16a34a;
        }

        .toggle-switch input:checked+.slider:before {
            transform: translateX(22px);
        }
    </style>

</head>

<body>

    <div class="dashboard">

        <h1>AttendX / Take Attendance</h1>

        <!-- ✅ CLEAN INFO BOX (NO TIME) -->

        <div class="card">
            <p><strong>Course</strong><span id="subject"></span></p>
            <p><strong>Department</strong><span id="department"></span></p>
            <p><strong>Program</strong><span id="program"></span></p>
            <p><strong>Semester</strong><span id="sem"></span></p>
            <p><strong>Section</strong><span id="section"></span></p>
        </div>

        <table>
            <thead>
                <tr>
                    <th>USN</th>
                    <th>Name</th>
                    <th>%</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="studentRows"></tbody>
        </table>

        <button onclick="submitAttendance()">Submit</button>

    </div>

    <script src="mockData.js"></script>
    <script src="attendance.js"></script>

</body>

</html>
