<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX Dashboard</title>

    <style>
        /* ===== BODY ===== */
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;

            background: linear-gradient(120deg, #eef2ff, #e0e7ff);
            color: #111;
        }

        /* ===== DASHBOARD ===== */
        .dashboard {
            max-width: 1100px;
            margin: 40px auto;
            padding: 25px;

            border-radius: 20px;
            background: #ffffff;

            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
            animation: fadeIn 0.5s ease;
        }

        /* ===== HEADER ===== */
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .header-actions h1 {
            font-size: 22px;
            color: #111;
        }

        /* ===== LOGOUT BUTTON (FIXED) ===== */
        .logout-btn {
            padding: 8px 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;

            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;

            transition: 0.3s;

            width: auto;
            /* 🔥 FIX */
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        /* ===== PROFILE ===== */
        .faculty-panel h2 {
            font-size: 24px;
            color: #111;
        }

        .dept {
            color: #555;
            margin-bottom: 15px;
        }

        /* ===== STATS ===== */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .course-card {
            background: #f8fafc;
            padding: 15px;
            border-radius: 14px;
            text-align: center;

            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .course-card:hover {
            transform: translateY(-5px);
            background: #f1f5f9;
        }

        .course-card h3 {
            font-size: 22px;
            color: #111;
        }

        .course-card p {
            font-size: 12px;
            color: #666;
        }

        /* ===== SCHEDULE ===== */
        .card {
            background: #f8fafc;
            padding: 15px;
            border-radius: 14px;
            margin-bottom: 20px;

            color: #111;
        }

        /* ===== SUBJECTS ===== */
        .subjects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
        }

        .subject-card {
            background: #f8fafc;
            padding: 18px;
            border-radius: 16px;

            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .subject-card:hover {
            transform: translateY(-6px) scale(1.02);
            background: #f1f5f9;
        }

        .subject-card h4 {
            margin-bottom: 8px;
            color: #111;
        }

        .subject-card p {
            font-size: 13px;
            color: #555;
        }

        /* ===== BUTTON (FIXED) ===== */
        button {
            margin-top: 12px;
            padding: 10px 16px;
            border-radius: 10px;
            border: none;

            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            font-weight: 600;

            cursor: pointer;
            transition: 0.3s;

            width: auto;
            /* 🔥 FIX */
        }

        /* ONLY subject buttons full width */
        .subject-card button {
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        /* ===== ANIMATION ===== */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="dashboard">

        <!-- HEADER -->
        <div class="header-actions">
            <h1>AttendX / Faculty Dashboard</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <!-- PROFILE -->
        <div class="faculty-panel">
            <h2 id="facultyName">Dr. Kumar</h2>
            <p id="facultyDept" class="dept">Department: CSE</p>
        </div>

        <!-- STATS -->
        <div class="cards faculty-stats">
            <div class="course-card">
                <h3 id="courseCount">3</h3>
                <p>Courses</p>
            </div>

            <div class="course-card">
                <h3 id="sectionCount">2</h3>
                <p>Sections</p>
            </div>

            <div class="course-card">
                <h3 id="studentCount">7</h3>
                <p>Students</p>
            </div>

            <div class="course-card">
                <h3 id="facultyId">faculty1</h3>
                <p>Faculty ID</p>
            </div>
        </div>

        <!-- SCHEDULE -->
        <div class="card">
            <h3>Today's Schedule</h3>
            <div id="todaySchedule">No classes today</div>
        </div>

        <!-- SUBJECTS -->
        <h3 style="margin-bottom:10px;">Your Courses</h3>

        <div class="subjects" id="courseCards">
            <div class="subject-card">
                <h4>Data Structures</h4>
                <p>CSE • Sem 3 • Sec A</p>
                <button>Take Attendance</button>
            </div>
        </div>

    </div>

    <script src="mockData.js"></script>
    <script src="utils.js"></script>
    <script src="dashboard.js"></script>

</body>

</html>
