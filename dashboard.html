<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="dashboard">

        <div class="header-actions">
            <h1>AttendX / Faculty Dashboard</h1>
            <div>
                <button onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="faculty-panel">
            <h2 id="facultyName"></h2>
            <div id="facultyDept" class="dept"></div>

            <div class="faculty-stats">
                <p><strong>Faculty ID:</strong> <span id="facultyId"></span></p>
                <p><strong>Courses Handling:</strong> <span id="courseCount"></span></p>
                <p><strong>Sections Teaching:</strong> <span id="sectionCount"></span></p>
                <p><strong>Total Students:</strong> <span id="studentCount"></span></p>
            </div>
        </div>

        <div id="messageBox" class="message-box"></div>

        <br>

        <div class="card timetable-card">
            <h3>Today's Schedule</h3>
            <div id="todaySchedule"></div>
        </div>

        <div class="cards" id="courseCards"></div>

    </div>

    <script src="mockData.js"></script>
    <script src="utils.js"></script>
    <script src="dashboard.js"></script>

</body>

</html>
