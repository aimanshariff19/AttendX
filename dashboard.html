<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #c7d2fe);
        }

        .dashboard {
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
            animation: fadeUp 0.6s ease;
        }

        /* HEADER */
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: clamp(24px, 3vw, 34px);
            font-weight: 700;
            color: #4338ca;
        }

        /* 🔥 BUTTON */
        button {
            padding: 10px 16px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: 0.25s;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }

        /* 💧 RIPPLE */
        button span.ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: rippleAnim 0.6s linear;
            background: rgba(255, 255, 255, 0.6);
        }

        @keyframes rippleAnim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* 🌀 LOADING */
        button.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        button.loading::after {
            content: "";
            width: 16px;
            height: 16px;
            border: 3px solid white;
            border-top: 3px solid transparent;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        /* 🔥 FACULTY PANEL */
        .faculty-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            padding: 24px 26px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border-left: 6px solid #6366f1;
            animation: fadeUp 0.7s ease;
        }

        .faculty-panel h2 {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
            color: #4f46e5;
        }

        .faculty-panel .dept {
            font-size: 14px;
            color: #6b7280;
            margin-top: 4px;
            margin-bottom: 16px;
        }

        .faculty-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px 20px;
        }

        .faculty-stats p {
            margin: 0;
            font-size: 14px;
            color: #374151;
        }

        .faculty-stats strong {
            color: #111827;
        }

        /* MESSAGE */
        .message-box {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-weight: 500;
            display: none;
            animation: fadeUp 0.4s ease;
        }

        .message-box.success {
            background: #dcfce7;
            color: #166534;
        }

        .message-box.error {
            background: #fee2e2;
            color: #991b1b;
        }

        /* CARD */
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            animation: fadeUp 0.8s ease;
        }

        .timetable-card h3 {
            margin-bottom: 10px;
            color: #4338ca;
        }

        /* TIMETABLE */
        .tt-item {
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 13px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            transition: 0.2s;
        }

        .tt-item:hover {
            transform: translateX(4px);
        }

        .tt-item strong {
            color: #4338ca;
        }

        /* COURSE CARDS */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .cards .card {
            transition: 0.25s;
        }

        .cards .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 14px 35px rgba(0, 0, 0, 0.12);
        }

        /* PAGE EXIT */
        .page-exit {
            animation: pageOut 0.5s ease forwards;
        }

        @keyframes pageOut {
            to {
                opacity: 0;
                transform: translateY(-40px);
            }
        }

        /* ENTRY */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="dashboard">

        <div class="header-actions">
            <h1>AttendX / Faculty Dashboard</h1>
            <div>
                <button onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="faculty-panel">
            <h2 id="facultyName"></h2>
            <div id="facultyDept" class="dept"></div>

            <div class="faculty-stats">
                <p><strong>Faculty ID:</strong> <span id="facultyId"></span></p>
                <p><strong>Courses Handling:</strong> <span id="courseCount"></span></p>
                <p><strong>Sections Teaching:</strong> <span id="sectionCount"></span></p>
                <p><strong>Total Students:</strong> <span id="studentCount"></span></p>
            </div>
        </div>

        <div id="messageBox" class="message-box"></div>

        <br>

        <div class="card timetable-card">
            <h3>Today's Schedule</h3>
            <div id="todaySchedule"></div>
        </div>

        <div class="cards" id="courseCards"></div>

    </div>

    <script src="mockData.js"></script>
    <script src="utils.js"></script>
    <script src="dashboard.js"></script>

</body>

</html>
