<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #c7d2fe);
        }

        .dashboard {
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
        }

        /* HEADER */
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: clamp(24px, 3vw, 34px);
            font-weight: 700;
            color: #4338ca;
        }

        button {
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: 0.25s;
            font-weight: 500;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(99, 102, 241, 0.4);
        }

        /* 🔥 FACULTY PANEL (UPGRADED) */
        .faculty-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            padding: 24px 26px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border-left: 6px solid #6366f1;
        }

        /* Name */
        .faculty-panel h2 {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
            color: #4f46e5;
        }

        /* Department */
        .faculty-panel .dept {
            font-size: 14px;
            color: #6b7280;
            margin-top: 4px;
            margin-bottom: 16px;
        }

        /* Stats grid */
        .faculty-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px 20px;
        }

        /* Each stat */
        .faculty-stats p {
            margin: 0;
            font-size: 14px;
            color: #374151;
        }

        /* Label */
        .faculty-stats strong {
            color: #111827;
            font-weight: 600;
        }

        /* MESSAGE */
        .message-box {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-weight: 500;
            display: none;
        }

        .message-box.success {
            background: #dcfce7;
            color: #166534;
        }

        .message-box.error {
            background: #fee2e2;
            color: #991b1b;
        }

        /* CARD */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }

        .timetable-card h3 {
            margin-bottom: 10px;
            color: #4338ca;
        }

        /* 🔥 COMPACT TIMETABLE */
        .tt-item {
            background: rgba(255, 255, 255, 0.95);
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 13px;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.05);
            line-height: 1.4;
        }

        .tt-item strong {
            color: #4338ca;
            font-size: 14px;
        }

        /* COURSE CARDS */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .cards .card {
            transition: 0.25s;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .cards .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
        }
    </style>
</head>

<body>

    <div class="dashboard">

        <div class="header-actions">
            <h1>AttendX / Faculty Dashboard</h1>
            <div>
                <button onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="faculty-panel">
            <h2 id="facultyName"></h2>
            <div id="facultyDept" class="dept"></div>

            <div class="faculty-stats">
                <p><strong>Faculty ID:</strong> <span id="facultyId"></span></p>
                <p><strong>Courses Handling:</strong> <span id="courseCount"></span></p>
                <p><strong>Sections Teaching:</strong> <span id="sectionCount"></span></p>
                <p><strong>Total Students:</strong> <span id="studentCount"></span></p>
            </div>
        </div>

        <div id="messageBox" class="message-box"></div>

        <br>

        <div class="card timetable-card">
            <h3>Today's Schedule</h3>
            <div id="todaySchedule"></div>
        </div>

        <div class="cards" id="courseCards"></div>

    </div>

    <script src="mockData.js"></script>
    <script src="utils.js"></script>
    <script src="dashboard.js"></script>

</body>

</html>
