<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="dashboard">

        <!-- 🔝 HEADER -->
        <div class="header-actions">
            <h1>AttendX / Faculty Dashboard</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <!-- 👤 PROFILE SECTION -->
        <div class="faculty-panel">

            <div class="profile-left">
                <h2 id="facultyName">Dr. Kumar</h2>
                <p id="facultyDept" class="dept">Department: CSE</p>
            </div>

            <!-- 📊 STATS GRID -->
            <div class="cards faculty-stats">
                <div class="course-card">
                    <h3 id="courseCount">3</h3>
                    <p>Courses</p>
                </div>

                <div class="course-card">
                    <h3 id="sectionCount">2</h3>
                    <p>Sections</p>
                </div>

                <div class="course-card">
                    <h3 id="studentCount">7</h3>
                    <p>Students</p>
                </div>

                <div class="course-card">
                    <h3 id="facultyId">faculty1</h3>
                    <p>Faculty ID</p>
                </div>
            </div>

        </div>

        <!-- 🔔 MESSAGE -->
        <div id="messageBox" class="message-box"></div>

        <!-- 📅 TODAY SCHEDULE -->
        <div class="card timetable-card">
            <h3>Today's Schedule</h3>
            <div id="todaySchedule">No classes today</div>
        </div>

        <!-- 📚 SUBJECT SECTION -->
        <h3 style="margin: 10px 0;">Your Courses</h3>

        <div class="cards subjects" id="courseCards">

            <!-- SAMPLE (JS will replace) -->
            <div class="course-card subject-card">
                <h4>Data Structures</h4>
                <p>CSE • Sem 3 • Sec A</p>
                <button>Take Attendance</button>
            </div>

        </div>

    </div>

    <!-- JS FILES -->
    <script src="mockData.js"></script>
    <script src="utils.js"></script>
    <script src="dashboard.js"></script>

</body>

</html>
