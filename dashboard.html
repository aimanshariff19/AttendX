<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AttendX Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: #f3f4f6;
        }

        .dashboard {
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
        }

        /* HEADER */

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 22px;
            color: #111827;
        }

        button {
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            background: #6366f1;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: 0.25s;
        }

        button:hover {
            background: #4f46e5;
        }

        /* FACULTY PANEL */

        .faculty-panel {
            background: linear-gradient(135deg, #eef2ff, #e0e7ff);
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.06);
            border-left: 5px solid #6366f1;
        }

        .faculty-panel h2 {
            margin: 0 0 8px;
            color: #4338ca;
        }

        .faculty-panel p {
            margin: 4px 0;
            font-size: 14px;
            color: #374151;
        }

        .faculty-stats {
            margin-top: 10px;
        }

        /* MESSAGE */

        .message-box {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-weight: 500;
            display: none;
        }

        /* CARD */

        .card {
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.06);
        }

        .timetable-card h3 {
            margin-bottom: 10px;
        }

        /* COURSE CARDS */

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .cards .card {
            transition: 0.25s;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .cards .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        }
    </style>

</head>

<body>

    <div class="dashboard">

        <div class="header-actions">

            <h1>AttendX / Faculty Dashboard</h1>

            <div>
                <button onclick="logout()">Logout</button>
            </div>

        </div>

        <div class="faculty-panel">

            <h2 id="facultyName"></h2>
            <p id="facultyDept"></p>

            <div class="faculty-stats">
                <p><strong>Faculty ID:</strong> <span id="facultyId"></span></p>
                <p><strong>Courses Handling:</strong> <span id="courseCount"></span></p>
                <p><strong>Sections Teaching:</strong> <span id="sectionCount"></span></p>
                <p><strong>Total Students:</strong> <span id="studentCount"></span></p>
            </div>

        </div>

        <div id="messageBox" class="message-box"></div>
        <br>

        <div class="card timetable-card">
            <h3>Today's Schedule</h3>
            <div id="todaySchedule"></div>
        </div>

        <div class="cards" id="courseCards"></div>

    </div>

    <script src="mockData.js"></script>
    <script src="utils.js"></script>
    <script src="dashboard.js"></script>

</body>

</html>
