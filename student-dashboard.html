<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #c7d2fe);
        }

        .dashboard {
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
            animation: fadeUp 0.6s ease;
        }

        /* HEADER */

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: clamp(24px, 3vw, 34px);
            font-weight: 700;
            color: #4338ca;
        }

        .error-message {
            color: #dc2626;
            font-size: 14px;
            font-weight: 500;
        }

        /* 🔥 BUTTON */

        button {
            padding: 10px 16px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: 0.25s;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }

        /* 💧 RIPPLE */

        button span.ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: rippleAnim 0.6s linear;
            background: rgba(255, 255, 255, 0.6);
        }

        @keyframes rippleAnim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* 🌀 LOADING */

        button.loading {
            pointer-events: none;
            opacity: 0.85;
        }

        button.loading::after {
            content: "";
            width: 16px;
            height: 16px;
            border: 3px solid white;
            border-top: 3px solid transparent;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        /* CARD */

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            animation: fadeUp 0.7s ease;
        }

        .card p {
            margin: 8px 0;
            font-size: 14px;
            color: #374151;
        }

        /* TABLE */

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            animation: fadeUp 0.8s ease;
        }

        th {
            background: #6366f1;
            color: white;
            font-weight: 500;
        }

        th,
        td {
            padding: 12px;
            text-align: center;
            font-size: 14px;
        }

        tbody tr {
            transition: 0.2s;
        }

        tbody tr:nth-child(even) {
            background: #f9fafb;
        }

        tbody tr:hover {
            background: #eef2ff;
            transform: scale(1.01);
        }

        /* LOGOUT */

        .logout-btn {
            margin-top: 20px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .logout-btn:hover {
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4);
        }

        /* 🚀 PAGE EXIT */

        .page-exit {
            animation: pageOut 0.5s ease forwards;
        }

        @keyframes pageOut {
            to {
                opacity: 0;
                transform: translateY(-40px);
            }
        }

        /* ✨ ENTRY */

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

</head>

<body>

    <div class="dashboard">

        <div class="header-actions">
            <h1>AttendX / Student Dashboard</h1>

            <p id="sessionError" class="error-message"></p>

            <div>
                <button id="changePasswordBtn">Change Password</button>
            </div>
        </div>

        <div class="card">
            <p><strong>Name:</strong> <span id="studentName"></span></p>
            <p><strong>USN:</strong> <span id="studentUSN"></span></p>
            <p><strong>Department:</strong> <span id="department"></span></p>
            <p><strong>Program:</strong> <span id="program"></span></p>
            <p><strong>Semester:</strong> <span id="sem"></span></p>
            <p><strong>Section:</strong> <span id="section"></span></p>
        </div>

        <br>

        <table>
            <thead>
                <tr>
                    <th>Subject Name</th>
                    <th>Subject Code</th>
                    <th>Classes Conducted</th>
                    <th>Present</th>
                    <th>Absent</th>
                    <th>Attendance %</th>
                </tr>
            </thead>

            <tbody id="subjectRows"></tbody>
        </table>

        <button class="logout-btn" id="logoutBtn">Logout</button>

    </div>

    <script src="mockData.js"></script>
    <script src="student-dashboard.js"></script>

</body>

</html>
