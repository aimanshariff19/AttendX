<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="dashboard">

        <div class="header-actions">
            <h1>AttendX / Student Dashboard</h1>

            <p id="sessionError" class="error-message"></p>

            <div>
                <button id="changePasswordBtn">Change Password</button>
            </div>
        </div>

        <div class="card">
            <p><strong>Name:</strong> <span id="studentName"></span></p>
            <p><strong>USN:</strong> <span id="studentUSN"></span></p>
            <p><strong>Department:</strong> <span id="department"></span></p>
            <p><strong>Program:</strong> <span id="program"></span></p>
            <p><strong>Semester:</strong> <span id="sem"></span></p>
            <p><strong>Section:</strong> <span id="section"></span></p>
        </div>

        <br>

        <table>
            <thead>
                <tr>
                    <th>Subject Name</th>
                    <th>Subject Code</th>
                    <th>Classes Conducted</th>
                    <th>Present</th>
                    <th>Absent</th>
                    <th>Attendance %</th>
                </tr>
            </thead>

            <tbody id="subjectRows"></tbody>
        </table>

        <button id="logoutBtn" class="logout-btn">Logout</button>

    </div>

    <script src="mockData.js"></script>
    <script src="student-dashboard.js"></script>

</body>

</html>
