<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Attendance</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #c7d2fe);
        }

        .dashboard {
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: clamp(24px, 3vw, 34px);
            font-weight: 700;
            color: #4338ca;
        }

        /* 🔥 BUTTON */
        button {
            padding: 10px 14px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            cursor: pointer;
            transition: 0.25s;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }

        button::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            top: 0;
            left: 0;
            transition: 0.3s;
        }

        button:hover::after {
            width: 100%;
        }

        .back-btn {
            background: #e5e7eb;
            color: #111827;
            margin-top: 10px;
        }

        /* 🔥 CARD */
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 16px;
            margin-top: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            animation: fadeUp 0.6s ease;
        }

        /* 🔥 CONTROLS */
        .controls-box {
            margin-top: 15px;
            background: #1e1e2f;
            padding: 18px;
            border-radius: 14px;
            color: white;
            animation: fadeUp 0.8s ease;
        }

        .controls-top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .controls-bottom {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .control-item {
            display: flex;
            flex-direction: column;
            font-size: 13px;
        }

        .control-item input {
            padding: 8px;
            border-radius: 6px;
            border: none;
            margin-top: 5px;
        }

        /* 🔥 MESSAGE */
        .message-box {
            margin-top: 10px;
            padding: 12px;
            border-radius: 10px;
            display: none;
            font-weight: 500;
            animation: fadeUp 0.4s ease;
        }

        .message-box.success {
            background: #dcfce7;
            color: #166534;
        }

        .message-box.error {
            background: #fee2e2;
            color: #991b1b;
        }

        /* 🔥 ANALYTICS */
        .analytics {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            animation: fadeUp 1s ease;
        }

        .analytic-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 16px;
            width: 180px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            font-weight: 600;
            transition: 0.3s;
        }

        .analytic-card span {
            display: block;
            font-size: 24px;
            color: #6366f1;
            margin-top: 5px;
        }

        .analytic-card:hover {
            transform: translateY(-6px);
        }

        /* 🔥 BULK */
        .bulk-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        /* 🔥 TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 14px;
            overflow: hidden;
            animation: fadeUp 1.2s ease;
        }

        th {
            background: #6366f1;
            color: white;
        }

        th,
        td {
            padding: 10px;
            text-align: center;
        }

        tbody tr {
            transition: 0.2s;
        }

        tbody tr:nth-child(even) {
            background: #f9fafb;
        }

        tbody tr:hover {
            transform: scale(1.01);
            background: #eef2ff !important;
        }

        /* 🔥 TOGGLE */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
        }

        .slider {
            position: absolute;
            background: #dc2626;
            border-radius: 24px;
            transition: .3s;
            inset: 0;
        }

        .slider:before {
            content: "";
            position: absolute;
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: .3s;
        }

        .toggle-switch input:checked+.slider {
            background: #16a34a;
        }

        .toggle-switch input:checked+.slider:before {
            transform: translateX(22px);
        }

        /* 🔥 SUBMIT */
        #submitBtn {
            margin-top: 15px;
            width: 100%;
        }

        /* 🔥 ANIMATION */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

</head>

<body>

    <div class="dashboard">

        <div class="header-actions">
            <h1>AttendX / Faculty Dashboard / Take Attendance</h1>
            <button onclick="viewAttendance()"> Edit Attendance</button>
        </div>

        <button class="back-btn" onclick="goBack()">← Go Back</button>

        <!-- 🔥 COURSE INFO -->
        <div class="card">
            <p> <strong>Course:</strong> <span id="subject"></span></p>
            <p> <strong>Department:</strong> <span id="department"></span></p>
            <p> <strong>Program:</strong> <span id="program"></span></p>
            <p> <strong>Semester:</strong> <span id="sem"></span></p>
            <p> <strong>Section:</strong> <span id="section"></span></p>
        </div>

        <!-- 🔥 CONTROLS -->
        <div class="controls-box">
            <div class="controls-top">
                <div>⏱ Current Time: <span id="currentTime">--</span></div>
                <div>🕒 Duration: <span id="timeRange">--</span></div>
            </div>

            <div class="controls-bottom">
                <div class="control-item">
                    <label>📅 Date</label>
                    <input type="date" id="date">
                </div>

                <div class="control-item">
                    <label> Start Time</label>
                    <input type="time" id="classTime">
                </div>

                <div class="control-item">
                    <label> No. of Classes</label>
                    <input type="number" id="numClasses" min="1" value="1">
                </div>
            </div>
        </div>

        <div id="messageBox" class="message-box"></div>

        <!-- 🔥 ANALYTICS -->
        <div class="analytics">
            <div class="analytic-card"> Total <span id="totalCount">0</span></div>
            <div class="analytic-card"> Present <span id="presentCount">0</span></div>
            <div class="analytic-card"> Absent <span id="absentCount">0</span></div>
        </div>

        <!-- 🔥 BULK -->
        <div class="bulk-actions">
            <button onclick="markAll('Present')">All Present</button>
            <button onclick="markAll('Absent')">All Absent</button>
        </div>

        <!-- 🔥 TABLE -->
        <table>
            <thead>
                <tr>
                    <th>USN</th>
                    <th>Name</th>
                    <th>%</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="studentRows"></tbody>
        </table>

        <button id="submitBtn" onclick="submitAttendance()">Submit Attendance</button>

    </div>

    <script src="mockData.js"></script>
    <script src="utils.js"></script>
    <script src="attendance.js"></script>

</body>

</html>
