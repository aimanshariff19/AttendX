    ```
    <!-- ICONS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f7ff;
        }

        /* ===== LOGIN CONTAINER ===== */
        .login-container {
            width: 380px;
            padding: 40px 30px;
            border-radius: 18px;

            background: linear-gradient(135deg, #5f5cff, #7c3aed);

            display: flex;
            flex-direction: column;
            gap: 18px;

            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);

            color: white;
            animation: fadeIn 0.6s ease;
        }

        /* ===== LOGO ===== */
        .college-logo {
            width: 60px;
            margin: 0 auto;
        }

        /* ===== TEXT ===== */
        .college-name {
            text-align: center;
            font-size: 17px;
            font-weight: 600;
        }

        .college-location,
        .college-status {
            text-align: center;
            font-size: 11px;
            opacity: 0.75;
        }

        .system-title {
            text-align: center;
            font-size: 16px;
            font-weight: 700;
            margin-top: 5px;
        }

        /* ===== FORM ===== */
        form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* ===== INPUT GROUP ===== */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.9);
        }

        .input-group input {
            padding: 13px 12px;
            border-radius: 12px;
            border: none;
            font-size: 14px;

            background: rgba(255, 255, 255, 0.2);
            color: white;

            outline: none;
            transition: 0.25s ease;
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.35);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.25);
        }

        /* ===== PASSWORD FIELD ===== */
        .password-field {
            position: relative;
        }

        .password-field input {
            padding-right: 48px;
        }

        /* ===== EYE ICON ===== */
        .eye {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #000;
            font-size: 14px;
            cursor: pointer;
            opacity: 0.9;
            transition: 0.2s;
        }

        .eye:hover {
            opacity: 1;
            transform: translateY(-50%) scale(1.1);
        }

        /* ===== BUTTON ===== */
        #loginBtn {
            width: 60%;
            height: 38px;

            margin: 0 auto;

            border-radius: 8px;
            border: none;

            background: linear-gradient(135deg, #ff7bff, #6a5cff);
            color: white;

            font-size: 13px;
            font-weight: 600;

            cursor: pointer;
            transition: 0.25s ease;

            display: flex;
            justify-content: center;
            align-items: center;

            position: relative;
        }

        #loginBtn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
        }

        #loginBtn:active {
            transform: scale(0.97);
        }

        /* ===== SPINNER ===== */
        .btn-loader {
            opacity: 0;

            width: 14px;
            height: 14px;

            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;

            position: absolute;
            top: 50%;
            left: 50%;

            margin-top: -7px;
            margin-left: -7px;

            animation: spin 0.6s linear infinite;
        }

        #loginBtn.loading .btn-text {
            opacity: 0;
        }

        #loginBtn.loading .btn-loader {
            opacity: 1;
        }

        /* ===== ERROR ===== */
        .error-text {
            text-align: center;
            font-size: 12px;
            color: #ff4d4d;
            min-height: 16px;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    ```

</head>

<body>

    ```
    <div class="login-container">

        <img src="assets/logo.png" class="college-logo" alt="Logo">

        <h2 class="college-name">Atria Institute of Technology</h2>
        <p class="college-location">Hebbal, Bengaluru</p>
        <p class="college-status">(Autonomous Institution)</p>

        <h3 class="system-title">AttendX Faculty Portal</h3>

        <form id="loginForm">

            <!-- USERNAME -->
            <div class="input-group">
                <label>Faculty ID</label>
                <input type="text" id="username" required>
            </div>

            <!-- PASSWORD -->
            <div class="input-group password-field">
                <label>Password</label>
                <input type="password" id="password" required>
                <i class="fa-solid fa-eye eye" id="eyeIcon"></i>
            </div>

            <!-- BUTTON -->
            <button id="loginBtn" type="button">
                <span class="btn-text">Login</span>
                <span class="btn-loader"></span>
            </button>

        </form>

        <p id="error" class="error-text"></p>

    </div>
