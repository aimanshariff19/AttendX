<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Attendance</title>

    <!-- IMPORTANT: correct path -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="dashboard">

        <!-- HEADER -->
        <div class="header-actions">
            <h1>AttendX / Take Attendance</h1>
            <button onclick="window.location.href='edit-attendance.html'">
                Edit Attendance
            </button>
        </div>

        <button onclick="goBack()">← Go Back</button>

        <!-- COURSE INFO -->
        <div class="card">
            <p><strong>Course:</strong> <span id="subject"></span></p>
            <p><strong>Department:</strong> <span id="department"></span></p>
            <p><strong>Program:</strong> <span id="program"></span></p>
            <p><strong>Semester:</strong> <span id="sem"></span></p>
            <p><strong>Section:</strong> <span id="section"></span></p>
        </div>

        <!-- FORM -->
        <div class="form-container">

            <div class="card">
                <p>⏱ Current Time: <span id="currentTime">--</span></p>
                <p>🕒 Duration: <span id="timeRange">--</span></p>
                <p>⏰ Start Time: <span id="displayTime">--</span></p>
            </div>

            <div class="input-group">
                <label>📅 Date</label>
                <input type="date" id="date">
            </div>

            <div class="input-group">
                <label>Start Time</label>
                <input type="time" id="classTime">
            </div>

            <div class="input-group">
                <label>No. of Classes</label>
                <input type="number" id="numClasses" value="1">
            </div>

        </div>

        <div id="messageBox" class="message-box"></div>

        <!-- ANALYTICS -->
        <div class="cards">
            <div class="course-card">Total <h3 id="totalCount">0</h3>
            </div>
            <div class="course-card">Present <h3 id="presentCount">0</h3>
            </div>
            <div class="course-card">Absent <h3 id="absentCount">0</h3>
            </div>
        </div>

        <!-- TABLE -->
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>USN</th>
                        <th>Name</th>
                        <th>%</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="studentRows"></tbody>
            </table>
        </div>

        <button id="submitBtn" onclick="submitAttendance()">
            Submit Attendance
        </button>

    </div>

    <!-- SUCCESS OVERLAY -->
    <div id="successOverlay">
        <div class="success-box">
            <div class="tick">✔</div>
            <p>Attendance Saved</p>
        </div>
    </div>

    <script src="mockData.js"></script>
    <script src="utils.js"></script>
    <script src="attendance.js"></script>

</body>

</html>
