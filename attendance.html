<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Attendance</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7ff;
        }

        /* ===== MAIN CONTAINER ===== */
        .dashboard {
            max-width: 950px;
            margin: 40px auto;
            /* 🔥 better top spacing */
            padding: 24px;
            /* 🔥 consistent padding */
        }

        /* ===== HEADER ===== */
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            /* 🔥 spacing fix */
        }

        /* ===== BUTTONS ===== */
        .btn {
            padding: 8px 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.25s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #111;
            margin-bottom: 18px;
            /* 🔥 spacing fix */
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        /* ===== SUBMIT BUTTON ===== */
        #submitBtn {
            width: 100%;
            margin-top: 22px;
            /* 🔥 more breathing space */
            height: 44px;
            position: relative;
        }

        /* ===== CARD ===== */
        .card {
            background: white;
            padding: 16px 18px;
            /* 🔥 balanced padding */
            border-radius: 12px;
            margin-bottom: 18px;
            /* 🔥 consistent spacing */
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }

        /* ===== FORM GRID ===== */
        .form-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 14px;
            /* 🔥 improved gap */
            margin-bottom: 18px;
            align-items: end;
        }

        /* TIME CARD FULL WIDTH */
        .form-container .card {
            grid-column: span 3;
            margin-bottom: 0;
        }

        /* ===== INPUT GROUP ===== */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            /* 🔥 better label spacing */
        }

        .input-group input {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        /* ===== ANALYTICS ===== */
        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin: 18px 0;
            /* 🔥 spacing fix */
        }

        .course-card {
            text-align: center;
            background: white;
            padding: 16px;
            /* 🔥 consistent */
            border-radius: 12px;
        }

        /* ===== TABLE ===== */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        thead th {
            text-align: left;
            padding: 12px 10px;
        }

        tbody tr {
            background: #f8fafc;
            border-radius: 10px;
        }

        tbody td {
            padding: 14px 12px;
            /* 🔥 better readability */
        }

        /* LEFT RED BORDER */
        tbody tr td:first-child {
            border-left: 4px solid red;
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
        }

        /* RIGHT RADIUS */
        tbody tr td:last-child {
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        tbody tr:hover {
            background: #eef2ff;
        }

        /* ===== TOGGLE ===== */
        .toggle-switch {
            position: relative;
            width: 36px;
            height: 18px;
        }

        .toggle-switch input {
            display: none;
        }

        .slider {
            position: absolute;
            inset: 0;
            background: #ccc;
            border-radius: 20px;
            cursor: pointer;
        }

        .slider::before {
            content: "";
            position: absolute;
            height: 14px;
            width: 14px;
            left: 2px;
            top: 2px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }

        input:checked+.slider {
            background: #22c55e;
        }

        input:checked+.slider::before {
            transform: translateX(18px);
        }

        /* ===== SPINNER ===== */
        .btn-loader {
            opacity: 0;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            margin-top: -7px;
            margin-left: -7px;
            animation: spin 0.6s linear infinite;
        }

        #submitBtn.loading .btn-text {
            opacity: 0;
        }

        #submitBtn.loading .btn-loader {
            opacity: 1;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>


</head>

<body>

    <div class="dashboard">

        <div class="header-actions">
            <h1>AttendX / Take Attendance</h1>
            <button class="btn btn-primary" onclick="window.location.href='edit-attendance.html'">
                Edit Attendance
            </button>
        </div>

        <button class="btn btn-secondary" onclick="goBack()">← Go Back</button>

        <!-- COURSE -->
        <div class="card">
            <p><strong>Course:</strong> <span id="subject"></span></p>
            <p><strong>Department:</strong> <span id="department"></span></p>
            <p><strong>Program:</strong> <span id="program"></span></p>
            <p><strong>Semester:</strong> <span id="sem"></span></p>
            <p><strong>Section:</strong> <span id="section"></span></p>
        </div>

        <!-- FORM -->
        <div class="form-container">

            <div class="card">
                <p>⏱ Current Time: <span id="currentTime">--</span></p>
                <p>🕒 Class Time: <span id="timeRange">--</span></p>
            </div>

            <div class="input-group">
                <label>Date</label>
                <input type="date" id="date">
            </div>

            <div class="input-group">
                <label>Start Time</label>
                <input type="time" id="classTime">
            </div>

            <div class="input-group">
                <label>No. of Classes</label>
                <input type="number" id="numClasses" value="1">
            </div>

        </div>

        <!-- STATS -->
        <div class="cards">
            <div class="course-card">Total <h3 id="totalCount">0</h3>
            </div>
            <div class="course-card">Present <h3 id="presentCount">0</h3>
            </div>
            <div class="course-card">Absent <h3 id="absentCount">0</h3>
            </div>
        </div>

        <!-- TABLE -->
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>USN</th>
                        <th>Name</th>
                        <th>%</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="studentRows"></tbody>
            </table>
        </div>

        <!-- BUTTON -->
        <button id="submitBtn" class="btn btn-primary">
            <span class="btn-text">Submit Attendance</span>
            <span class="btn-loader"></span>
        </button>

    </div>

    <script src="mockData.js"></script>
    <script src="utils.js"></script>
    <script src="attendance.js"></script>

</body>

</html>
