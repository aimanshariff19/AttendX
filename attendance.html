<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Attendance</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="dashboard">

        <div class="header-actions">
            <h1>AttendX / Faculty Dashboard / Take Attendance</h1>
            <button onclick="viewAttendance()">Edit Attendance</button>
        </div>

        <button class="back-btn" onclick="goBack()">← Go Back</button>
        <button onclick="exportToExcel()">Export to Excel</button> <br><br>

        <!-- ✅ INFO CARD -->
        <div class="card">
            <p><strong>Course:</strong> <span id="subject"></span></p>
            <p><strong>Department:</strong> <span id="department"></span></p>
            <p><strong>Program:</strong> <span id="program"></span></p>
            <p><strong>Semester:</strong> <span id="sem"></span></p>
            <p><strong>Section:</strong> <span id="section"></span></p>
        </div>

        <!-- ✅ CONTROLS (FIXED STRUCTURE) -->
        <div class="controls-box">

            <!-- 🔥 TOP ROW -->
            <div class="controls-top">
                <div class="current-time">
                    Current Time: <span id="currentTime">--</span>
                </div>

                <div class="time-display">
                    Duration: <span id="timeRange">--</span>
                </div>
            </div>

            <!-- 🔥 BOTTOM ROW -->
            <div class="controls-bottom">

                <div class="control-item">
                    <label>Date</label>
                    <input type="date" id="date">
                </div>

                <div class="control-item">
                    <label>Start Time</label>
                    <input type="time" id="classTime">
                </div>

                <div class="control-item">
                    <label>No. of Classes</label>
                    <input type="number" id="numClasses" min="1" value="1">
                </div>

            </div>

        </div>
        
        <div id="messageBox" class="message-box"></div>

        <!-- ✅ ANALYTICS -->
        <div class="analytics">
            <div class="analytic-card">Total <span id="totalCount">0</span></div>
            <div class="analytic-card">Present <span id="presentCount">0</span></div>
            <div class="analytic-card">Absent <span id="absentCount">0</span></div>
        </div>

        <!-- ✅ BULK BUTTONS -->
        <div class="bulk-actions">
            <button onclick="markAll('Present')">All Present</button>
            <button onclick="markAll('Absent')">All Absent</button>
        </div>

        <!-- ✅ TABLE -->
        <table>
            <thead>
                <tr>
                    <th>USN</th>
                    <th>Name</th>
                    <th>Percentage</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="studentRows"></tbody>
        </table>

        <button id="submitBtn" onclick="submitAttendance()">Submit Attendance</button>

    </div>

    <!-- Scripts -->
    <script src="mockData.js"></script>
    <script src="utils.js"></script>
    <script src="attendance.js"></script>

</body>

</html>
