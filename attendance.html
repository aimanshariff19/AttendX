    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7ff;
        }

        .dashboard {
            max-width: 1000px;
            margin: 30px auto;
            padding: 20px;
        }

        /* ===== HEADER ===== */
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        /* ===== BUTTONS ===== */
        .btn {
            padding: 8px 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.25s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #111;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
        }

        #submitBtn {
            width: 100%;
            margin-top: 15px;
            position: relative;
        }

        /* ===== CARD ===== */
        .card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }

        /* ===== FORM ===== */
        .form-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .input-group input {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        /* ===== CARDS ===== */
        .cards {
            display: flex;
            gap: 12px;
        }

        .course-card {
            flex: 1;
            text-align: center;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }

        /* ===== TABLE ===== */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 10px;
        }

        tbody tr:hover {
            background: #f9fafb;
        }

        /* ===== TOGGLE SWITCH (JS REQUIRED) ===== */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 18px;
        }

        .toggle-switch input {
            display: none;
        }

        .slider {
            position: absolute;
            inset: 0;
            background: #ccc;
            border-radius: 20px;
            cursor: pointer;
        }

        .slider::before {
            content: "";
            position: absolute;
            height: 14px;
            width: 14px;
            left: 2px;
            top: 2px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }

        input:checked+.slider {
            background: #22c55e;
        }

        input:checked+.slider::before {
            transform: translateX(18px);
        }

        /* ===== SPINNER ===== */
        .btn-loader {
            opacity: 0;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;

            position: absolute;
            top: 50%;
            left: 50%;

            margin-top: -7px;
            margin-left: -7px;

            animation: spin 0.6s linear infinite;
        }

        #submitBtn.loading .btn-text {
            opacity: 0;
        }

        #submitBtn.loading .btn-loader {
            opacity: 1;
        }

        /* ===== RIPPLE ===== */
        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            background: rgba(255, 255, 255, 0.5);
            animation: ripple 0.6s linear;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

</head>

<body>
