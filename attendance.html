<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Attendance</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: #f3f4f6;
        }

        .dashboard {
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
        }

        /* HEADER */

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 20px;
            color: #111827;
        }

        button {
            padding: 10px 14px;
            border-radius: 8px;
            border: none;
            background: #6366f1;
            color: white;
            cursor: pointer;
            transition: 0.25s;
        }

        button:hover {
            background: #4f46e5;
        }

        .back-btn {
            background: #e5e7eb;
            color: #111827;
            margin-top: 10px;
        }

        .back-btn:hover {
            background: #d1d5db;
        }

        /* CARD */

        .card {
            background: white;
            padding: 18px;
            border-radius: 12px;
            margin-top: 15px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.05);
        }

        /* CONTROLS */

        .controls-box {
            margin-top: 15px;
            background: #1e1e2f;
            padding: 15px;
            border-radius: 12px;
            color: white;
        }

        .controls-top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .controls-bottom {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .control-item {
            display: flex;
            flex-direction: column;
            font-size: 13px;
        }

        .control-item input {
            padding: 8px;
            border-radius: 6px;
            border: none;
            margin-top: 5px;
        }

        /* MESSAGE */

        .message-box {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }

        /* ANALYTICS */

        .analytics {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        .analytic-card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            width: 180px;
            text-align: center;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.05);
            font-weight: 600;
        }

        .analytic-card span {
            display: block;
            font-size: 22px;
            color: #6366f1;
            margin-top: 5px;
        }

        /* BULK */

        .bulk-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        /* TABLE */

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }

        th {
            background: #6366f1;
            color: white;
        }

        th,
        td {
            padding: 10px;
            text-align: center;
        }

        tbody tr:nth-child(even) {
            background: #f9fafb;
        }

        tbody tr:hover {
            background: #eef2ff;
        }

        /* SUBMIT */

        #submitBtn {
            margin-top: 15px;
            width: 100%;
        }
    </style>

</head>

<body>

    <div class="dashboard">

        <div class="header-actions">
            <h1>AttendX / Faculty Dashboard / Take Attendance</h1>
            <button onclick="viewAttendance()">Edit Attendance</button>
        </div>

        <button class="back-btn" onclick="goBack()">← Go Back</button>
        <button onclick="exportToExcel()">Export to Excel</button>

        <!-- INFO CARD -->
        <div class="card">
            <p><strong>Course:</strong> <span id="subject"></span></p>
            <p><strong>Department:</strong> <span id="department"></span></p>
            <p><strong>Program:</strong> <span id="program"></span></p>
            <p><strong>Semester:</strong> <span id="sem"></span></p>
            <p><strong>Section:</strong> <span id="section"></span></p>
        </div>

        <!-- CONTROLS -->
        <div class="controls-box">

            <div class="controls-top">
                <div>Current Time: <span id="currentTime">--</span></div>
                <div>Duration: <span id="timeRange">--</span></div>
            </div>

            <div class="controls-bottom">

                <div class="control-item">
                    <label>Date</label>
                    <input type="date" id="date">
                </div>

                <div class="control-item">
                    <label>Start Time</label>
                    <input type="time" id="classTime">
                </div>

                <div class="control-item">
                    <label>No. of Classes</label>
                    <input type="number" id="numClasses" min="1" value="1">
                </div>

            </div>

        </div>

        <div id="messageBox" class="message-box"></div>

        <!-- ANALYTICS -->
        <div class="analytics">
            <div class="analytic-card">Total <span id="totalCount">0</span></div>
            <div class="analytic-card">Present <span id="presentCount">0</span></div>
            <div class="analytic-card">Absent <span id="absentCount">0</span></div>
        </div>

        <!-- BULK -->
        <div class="bulk-actions">
            <button onclick="markAll('Present')">All Present</button>
            <button onclick="markAll('Absent')">All Absent</button>
        </div>

        <!-- TABLE -->
        <table>
            <thead>
                <tr>
                    <th>USN</th>
                    <th>Name</th>
                    <th>Percentage</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="studentRows"></tbody>
        </table>

        <button id="submitBtn" onclick="submitAttendance()">Submit Attendance</button>

    </div>

    <script src="mockData.js"></script>
    <script src="utils.js"></script>
    <script src="attendance.js"></script>

</body>

</html>
