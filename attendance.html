<style>
    /* ===== RESET ===== */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', sans-serif;
        background: #f5f7ff;
    }

    /* ===== MAIN DASHBOARD ===== */
    .dashboard {
        max-width: 1000px;
        margin: 30px auto;
        padding: 20px;
    }

    /* ===== HEADER ===== */
    .header-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .header-actions h1 {
        font-size: 20px;
        font-weight: 600;
    }

    /* ===== BUTTONS ===== */
    button {
        padding: 8px 14px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        transition: 0.25s;
    }

    /* PRIMARY */
    button {
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white;
    }

    button:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    }

    /* BACK BUTTON */
    button:nth-of-type(2) {
        margin-bottom: 15px;
        background: #e2e8f0;
        color: #111;
    }

    /* SUBMIT BUTTON */
    #submitBtn {
        width: 100%;
        margin-top: 15px;
    }

    /* ===== CARD ===== */
    .card {
        background: white;
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 15px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    }

    /* ===== FORM GRID ===== */
    .form-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 12px;
        margin-bottom: 10px;
    }

    /* ===== INPUT ===== */
    .input-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    .input-group label {
        font-size: 12px;
        color: #444;
    }

    .input-group input {
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ddd;
        font-size: 13px;
    }

    .input-group input:focus {
        outline: none;
        border-color: #6366f1;
    }

    /* ===== ANALYTICS ===== */
    .cards {
        display: flex;
        gap: 12px;
        margin-bottom: 15px;
    }

    .course-card {
        flex: 1;
        text-align: center;
        background: white;
        padding: 15px;
        border-radius: 12px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    }

    .course-card h3 {
        margin-top: 5px;
    }

    /* ===== TABLE ===== */
    table {
        width: 100%;
        border-collapse: collapse;
    }

    thead {
        background: #eef2ff;
    }

    th, td {
        padding: 10px;
        font-size: 13px;
        text-align: left;
    }

    tbody tr {
        border-bottom: 1px solid #eee;
        transition: 0.2s;
    }

    tbody tr:hover {
        background: #f9fafb;
    }

    /* ===== MESSAGE ===== */
    .message-box {
        margin: 10px 0;
        font-size: 13px;
        color: #ef4444;
    }

    /* ===== SUCCESS OVERLAY ===== */
    #successOverlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        display: none;
        justify-content: center;
        align-items: center;
    }

    #successOverlay.show {
        display: flex;
    }

    .success-box {
        background: white;
        padding: 25px;
        border-radius: 12px;
        text-align: center;
    }

    .tick {
        font-size: 30px;
        color: green;
    }
</style>
```

```
<div class="dashboard">

    <!-- HEADER -->
    <div class="header-actions">
        <h1>AttendX / Take Attendance</h1>
        <button onclick="window.location.href='edit-attendance.html'">
            Edit Attendance
        </button>
    </div>

    <button onclick="goBack()">← Go Back</button>

    <!-- COURSE INFO -->
    <div class="card">
        <p><strong>Course:</strong> <span id="subject"></span></p>
        <p><strong>Department:</strong> <span id="department"></span></p>
        <p><strong>Program:</strong> <span id="program"></span></p>
        <p><strong>Semester:</strong> <span id="sem"></span></p>
        <p><strong>Section:</strong> <span id="section"></span></p>
    </div>

    <!-- FORM -->
    <div class="form-container">

        <div class="card">
            <p>⏱ Current Time: <span id="currentTime">--</span></p>
            <p>🕒 Duration: <span id="timeRange">--</span></p>
            <p>⏰ Start Time: <span id="displayTime">--</span></p>
        </div>

        <div class="input-group">
            <label>📅 Date</label>
            <input type="date" id="date">
        </div>

        <div class="input-group">
            <label>Start Time</label>
            <input type="time" id="classTime">
        </div>

        <div class="input-group">
            <label>No. of Classes</label>
            <input type="number" id="numClasses" value="1">
        </div>

    </div>

    <div id="messageBox" class="message-box"></div>

    <!-- ANALYTICS -->
    <div class="cards">
        <div class="course-card">Total <h3 id="totalCount">0</h3></div>
        <div class="course-card">Present <h3 id="presentCount">0</h3></div>
        <div class="course-card">Absent <h3 id="absentCount">0</h3></div>
    </div>

    <!-- TABLE -->
    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>USN</th>
                    <th>Name</th>
                    <th>%</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="studentRows"></tbody>
        </table>
    </div>

    <button id="submitBtn" onclick="submitAttendance()">
        Submit Attendance
    </button>

</div>

<!-- SUCCESS OVERLAY -->
<div id="successOverlay">
    <div class="success-box">
        <div class="tick">✔</div>
        <p>Attendance Saved</p>
    </div>
</div>

<script src="mockData.js"></script>
<script src="utils.js"></script>
<script src="attendance.js"></script>
