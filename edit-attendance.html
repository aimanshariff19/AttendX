<!DOCTYPE html>

<html>

<head>

    ```
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Attendance</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7ff;
        }

        .dashboard {
            max-width: 950px;
            margin: 40px auto;
            padding: 24px;
        }

        h1 {
            margin-bottom: 20px;
        }

        /* CARD */
        .card {
            background: white;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 18px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }

        /* CONTROLS */
        .attendance-controls {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 14px;
            align-items: end;
            margin-bottom: 18px;
        }

        .attendance-controls label {
            font-size: 13px;
            margin-bottom: 4px;
            display: block;
        }

        .attendance-controls input,
        .attendance-controls select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .attendance-controls button {
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            cursor: pointer;
            font-weight: 600;
        }

        /* BULK BUTTONS */
        .bulk-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .bulk-actions button {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        .bulk-actions button:first-child {
            background: #22c55e;
            color: white;
        }

        .bulk-actions button:last-child {
            background: #ef4444;
            color: white;
        }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
            margin-bottom: 20px;
        }

        thead th {
            text-align: left;
            padding: 12px;
        }

        tbody tr {
            background: #f8fafc;
            border-radius: 10px;
        }

        tbody td {
            padding: 14px 12px;
        }

        tbody tr td:first-child {
            border-left: 4px solid red;
            border-radius: 10px 0 0 10px;
        }

        tbody tr td:last-child {
            border-radius: 0 10px 10px 0;
        }

        tbody tr:hover {
            background: #eef2ff;
        }

        /* UPDATE BUTTON */
        .update-btn-container {
            margin-top: 10px;
        }

        .update-btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .update-btn:hover {
            transform: translateY(-1px);
        }
    </style>


</head>

<body>

    <div class="dashboard">

        <h1>AttendX / Edit Attendance</h1>

        <div class="card">
            <p><strong>Course:</strong> <span id="subject"></span></p>
            <p><strong>Department:</strong> <span id="department"></span></p>
            <p><strong>Program:</strong> <span id="program"></span></p>
            <p><strong>Semester:</strong> <span id="sem"></span></p>
            <p><strong>Section:</strong> <span id="section"></span></p>
        </div>

        <!-- CONTROLS -->
        <div class="attendance-controls">

            <div>
                <label>📅 Date</label>
                <input type="date" id="attendanceDate">
            </div>

            <div>
                <label>⏰ Class Time</label>
                <select id="timeSelect">
                    <option>Select date first</option>
                </select>
            </div>

            <div>
                <button onclick="loadAttendance()">Load</button>
            </div>

        </div>

        <!-- BULK -->
        <div class="bulk-actions">
            <button onclick="markAllEdit('Present')">All Present</button>
            <button onclick="markAllEdit('Absent')">All Absent</button>
        </div>

        <!-- TABLE -->
        <table>
            <thead>
                <tr>
                    <th>USN</th>
                    <th>Name</th>
                    <th>%</th>
                    <th>Status</th>
                    <th>Reason</th>
                </tr>
            </thead>
            <tbody id="studentRows"></tbody>
        </table>

        <!-- UPDATE -->
        <div class="update-btn-container">
            <button class="update-btn" onclick="updateAttendance()">
                Update Attendance
            </button>
        </div>

    </div>

    <script src="mockData.js"></script>
    <script src="utils.js"></script>
    <script src="edit.js"></script>

</body>

</html>
