<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Attendance</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #c7d2fe);
        }

        .dashboard {
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
        }

        h1 {
            font-size: clamp(24px, 3vw, 34px);
            font-weight: 700;
            color: #4338ca;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            margin-bottom: 15px;
        }

        .message-box {
            margin-top: 10px;
            padding: 12px;
            border-radius: 10px;
            display: none;
            font-weight: 500;
        }

        .message-box.success {
            background: #dcfce7;
            color: #166534;
        }

        .message-box.error {
            background: #fee2e2;
            color: #991b1b;
        }

        /* 🔥 CONTROLS */
        .attendance-controls {
            margin: 15px 0;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .attendance-controls div {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 220px;
        }

        /* 🔥 FIXED INPUT + SELECT */
        input,
        select {
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            width: 100%;
            font-size: 14px;
            background: white;
            box-sizing: border-box;
            height: 42px;
            /* SAME HEIGHT */
        }

        /* 🔥 REMOVE BAD STYLING */
        select {
            border-bottom: none;
            appearance: none;
            cursor: pointer;
        }

        /* 🔥 FOCUS EFFECT */
        input:focus,
        select:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        /* 🔥 BUTTON ALIGN FIX */
        .attendance-controls button {
            height: 42px;
            padding: 0 20px;
        }

        button {
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            cursor: pointer;
            transition: 0.25s;
            font-weight: 500;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(99, 102, 241, 0.4);
        }

        .bulk-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 14px;
            overflow: hidden;
        }

        th {
            background: #6366f1;
            color: white;
        }

        th,
        td {
            padding: 10px;
            text-align: center;
        }

        tbody tr:nth-child(even) {
            background: #f9fafb;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
        }

        .slider {
            position: absolute;
            background: #dc2626;
            border-radius: 24px;
            inset: 0;
            transition: .3s;
        }

        .slider:before {
            content: "";
            position: absolute;
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: .3s;
        }

        .toggle-switch input:checked+.slider {
            background: #16a34a;
        }

        .toggle-switch input:checked+.slider:before {
            transform: translateX(22px);
        }

        .update-btn-container {
            margin-top: 15px;
            text-align: right;
        }

        .update-btn {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        /* 💧 RIPPLE */
        button {
            position: relative;
            overflow: hidden;
        }

        button span.ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: rippleAnim 0.6s linear;
            background: rgba(255, 255, 255, 0.6);
        }

        @keyframes rippleAnim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* 🌀 LOADING BUTTON */
        button.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        button.loading::after {
            content: "";
            width: 16px;
            height: 16px;
            border: 3px solid white;
            border-top: 3px solid transparent;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        /* 🚀 PAGE EXIT */
        .page-exit {
            animation: pageOut 0.5s ease forwards;
        }

        @keyframes pageOut {
            to {
                opacity: 0;
                transform: translateY(-30px);
            }
        }

        /* ✨ ROW ENTRY */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

</head>

<body>

    <div class="dashboard">

        <h1> AttendX / Edit Attendance</h1>

        <div class="card">
            <p> <strong>Course:</strong> <span id="subject"></span></p>
            <p> <strong>Department:</strong> <span id="department"></span></p>
            <p> <strong>Program:</strong> <span id="program"></span></p>
            <p> <strong>Semester:</strong> <span id="sem"></span></p>
            <p> <strong>Section:</strong> <span id="section"></span></p>
        </div>

        <div id="messageBox" class="message-box"></div>

        <!-- 🔥 CONTROLS -->
        <div class="attendance-controls">

            <div>
                <label>📅 Date</label>
                <input type="date" id="attendanceDate">
            </div>

            <div>
                <label>⏰ Class Time</label>
                <select id="timeSelect">
                    <option>Select date first</option>
                </select>
            </div>

            <div>
                <button onclick="loadAttendance()">Load</button>
            </div>

        </div>

        <div class="bulk-actions">
            <button onclick="markAllEdit('Present')">All Present</button>
            <button onclick="markAllEdit('Absent')">All Absent</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>USN</th>
                    <th>Name</th>
                    <th>%</th>
                    <th>Status</th>
                    <th>Reason</th>
                </tr>
            </thead>
            <tbody id="studentRows"></tbody>
        </table>

        <div class="update-btn-container">
            <button class="update-btn" onclick="updateAttendance()">Update Attendance</button>
        </div>

    </div>

    <script src="mockData.js"></script>
    <script src="utils.js"></script>
    <script src="edit.js"></script>

</body>

</html>
