<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Attendance</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #c7d2fe);
        }

        .dashboard {
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
        }

        h1 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #4338ca;
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 18px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            margin-bottom: 15px;
        }

        .message-box {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            display: none;
            font-weight: 500;
        }

        .message-box.success {
            background: #dcfce7;
            color: #166534;
        }

        .message-box.error {
            background: #fee2e2;
            color: #991b1b;
        }

        .attendance-controls {
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        input[type="date"] {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #d1d5db;
        }

        button {
            padding: 10px 14px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            cursor: pointer;
            transition: 0.25s;
            font-weight: 500;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(99, 102, 241, 0.4);
        }

        .bulk-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            overflow: hidden;
        }

        th {
            background: #6366f1;
            color: white;
        }

        th,
        td {
            padding: 10px;
            text-align: center;
        }

        tbody tr:nth-child(even) {
            background: #f9fafb;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
        }

        .slider {
            position: absolute;
            background: #dc2626;
            border-radius: 24px;
            inset: 0;
            transition: .3s;
        }

        .slider:before {
            content: "";
            position: absolute;
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: .3s;
        }

        .toggle-switch input:checked+.slider {
            background: #16a34a;
        }

        .toggle-switch input:checked+.slider:before {
            transform: translateX(22px);
        }

        .update-btn-container {
            margin-top: 15px;
            text-align: right;
        }

        .update-btn {
            background: linear-gradient(135deg, #10b981, #059669);
        }
    </style>

</head>

<body>

    <div class="dashboard">

        <h1>AttendX / Faculty Dashboard / Edit Attendance</h1>

        <div class="card">
            <p><strong>Course:</strong> <span id="subject"></span></p>
            <p><strong>Department:</strong> <span id="department"></span></p>
            <p><strong>Program:</strong> <span id="program"></span></p>
            <p><strong>Semester:</strong> <span id="sem"></span></p>
            <p><strong>Section:</strong> <span id="section"></span></p>
        </div>

        <div id="messageBox" class="message-box"></div>

        <div class="attendance-controls">
            <label>Select Date:</label>
            <input type="date" id="attendanceDate">
            <button onclick="loadAttendance()">Load</button>
        </div>

        <div class="bulk-actions">
            <button onclick="markAllEdit('Present')">All Present</button>
            <button onclick="markAllEdit('Absent')">All Absent</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>USN</th>
                    <th>Name</th>
                    <th>%</th>
                    <th>Status</th>
                    <th>Reason</th>
                </tr>
            </thead>
            <tbody id="studentRows"></tbody>
        </table>

        <div class="update-btn-container">
            <button class="update-btn" onclick="updateAttendance()">Update Attendance</button>
        </div>

    </div>

    <script src="mockData.js"></script>
    <script src="utils.js"></script>
    <script src="edit.js"></script>

</body>

</html>
