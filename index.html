<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX Faculty Login</title>

    <!-- ICONS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

    <div class="login-container">

        <!-- LOGO -->
        <img src="assets/logo.png" class="college-logo">

        <!-- COLLEGE INFO -->
        <h2 class="college-name">Atria Institute of Technology</h2>
        <p class="college-location">Hebbal, Bengaluru</p>
        <p class="college-status">(Autonomous Institution)</p>

        <!-- SYSTEM TITLE -->
        <h3 class="system-title">AttendX Faculty Portal</h3>

        <!-- USERNAME -->
        <div class="input-group">
            <input type="text" id="username" placeholder="Enter Faculty ID">
        </div>

        <!-- PASSWORD -->
        <div class="input-group password-field">
            <input type="password" id="password" placeholder="Enter Password">
            <i id="eyeIcon" class="fa-solid fa-eye eye"></i>
        </div>

        <!-- LOGIN BUTTON -->
        <button id="loginBtn" onclick="login()">Login</button>

        <!-- ERROR -->
        <p id="error" class="error-text"></p>

    </div>

    <!-- JS -->
    <script src="mockData.js"></script>
    <script src="hodData.js"></script>
    <script src="login.js"></script>
    <script src="utils.js"></script>

</body>

</html>
