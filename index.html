<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX Faculty Login</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page faculty">

    <div class="login-container">

        <img src="assets/logo.png" class="college-logo" alt="Atria Logo">

        <div class="college-info">
            <h2 class="college-name">Atria Institute of Technology</h2>
            <p class="college-location">Hebbal, Bengaluru</p>
            <p class="college-status">(Autonomous Institution)</p>
        </div>

        <h3 class="system-title">AttendX Faculty Portal</h3>

        <form id="loginForm">

            <!-- USERNAME -->
            <div class="input-group">
                <input type="text" id="username" placeholder=" " required>
                <label>Faculty ID</label>
            </div>

            <!-- PASSWORD -->
            <div class="input-group password-field">
                <input type="password" id="password" placeholder=" " required>
                <label>Password</label>
                <i id="eyeIcon" class="fa-solid fa-eye eye"></i>
            </div>

            <button id="loginBtn" type="button">
                <span class="btn-text">Login</span>
            </button>

        </form>

        <p id="error" class="error-text"></p>

    </div>

</body>

</html>
