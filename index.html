<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX Faculty Login</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body class="login-page">

    <div class="login-container">

        <img src="assets/logo.png" class="college-logo">

        <h2 class="college-name">Atria Institute of Technology</h2>
        <p class="college-location">Hebbal, Bengaluru</p>
        <p class="college-status">(Autonomous Institution)</p>

        <h3 class="system-title">AttendX Faculty Portal</h3>

        <input type="text" id="username" placeholder="Enter Faculty ID">

        <div class="password-field">
            <input type="password" id="password" placeholder="Enter Password">
            <i id="eyeIcon" class="fa-solid fa-eye eye"></i>
        </div>

        <button id="loginBtn" onclick="login()">Login</button>

        <p id="error"></p>

    </div>

    <script src="mockData.js"></script>
    <script src="hodData.js"></script>
    <script src="login.js"></script>
    <script src="utils.js"></script>


</body>

</html>
