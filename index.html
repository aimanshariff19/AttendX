<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX Faculty Login</title>

    <!-- ICONS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page faculty">

    <div class="login-container">

        <!-- LOGO -->
        <img src="assets/logo.png" class="college-logo" alt="Atria Logo">

        <!-- COLLEGE INFO -->
        <div class="college-info">
            <h2 class="college-name">Atria Institute of Technology</h2>
            <p class="college-location">Hebbal, Bengaluru</p>
            <p class="college-status">(Autonomous Institution)</p>
        </div>

        <!-- SYSTEM TITLE -->
        <h3 class="system-title">AttendX Faculty Portal</h3>

        <!-- FORM -->
        <form onsubmit="login(); return false;">

            <!-- USERNAME -->
            <div class="input-group">
                <input type="text" id="username" placeholder=" " required autocomplete="username">
                <label for="username">Faculty ID</label>
            </div> <br>

            <!-- PASSWORD -->
            <div class="input-group password-field">
                <input type="password" id="password" placeholder=" " required autocomplete="current-password">
                <label for="password">Password</label>
                <i id="eyeIcon" class="fa-solid fa-eye eye"></i>
            </div>

            <!-- LOGIN BUTTON -->
            <button id="loginBtn" type="submit">
                <span class="btn-text">Login</span>
            </button>

        </form>

        <!-- ERROR -->
        <p id="error" class="error-text"></p>

    </div>

    <!-- SUCCESS POP -->
    <div id="successPop" class="success-pop">
        <div class="success-box">
            <h3>✅ Login Successful</h3>
            <p>Redirecting...</p>
        </div>
    </div>

    <!-- JS -->
    <script src="mockData.js"></script>
    <script src="hodData.js"></script>
    <script src="login.js"></script>
    <script src="utils.js"></script>

</body>

</html>
