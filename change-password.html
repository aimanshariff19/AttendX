<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Change Password</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: #f3f4f6;
        }

        .dashboard {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }

        /* HEADER */

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 20px;
            color: #111827;
        }

        /* BUTTON */

        button {
            padding: 10px 14px;
            border-radius: 8px;
            border: none;
            background: #6366f1;
            color: white;
            cursor: pointer;
            transition: 0.25s;
        }

        button:hover {
            background: #4f46e5;
        }

        .back-btn {
            background: #e5e7eb;
            color: #111827;
        }

        .back-btn:hover {
            background: #d1d5db;
        }

        /* CARD */

        .card {
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
        }

        /* INPUTS */

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0 15px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            font-size: 14px;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #6366f1;
            outline: none;
            box-shadow: 0 0 0 2px rgba(99,102,241,0.2);
        }

        /* MESSAGE */

        .message-box {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
    </style>

</head>

<body>

    <div class="dashboard">

        <div class="header-actions">
            <h1>AttendX / Change Password</h1>
            <button class="back-btn" onclick="goBack()">← Go Back</button>
        </div>

        <div class="card">

            <div id="messageBox" class="message-box"></div>

            <p><strong>Old Password</strong></p>
            <input type="password" id="oldPass">

            <p><strong>New Password</strong></p>
            <input type="password" id="newPass">

            <p><strong>Confirm Password</strong></p>
            <input type="password" id="confirmPass">

            <button onclick="updatePassword()">Update Password</button>

        </div>

    </div>

    <script src="mockData.js"></script>
    <script src="change-password.js"></script>

</body>

</html>
