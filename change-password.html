<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Change Password</title>

    <style>
        /* -------- 🌌 PAGE -------- */
        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #c7d2fe);
            min-height: 100vh;
        }

        .dashboard {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            animation: fadeUp 0.6s ease;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: clamp(24px, 3vw, 34px);
            font-weight: 700;
            color: #4338ca;
        }

        button {
            padding: 12px 18px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            cursor: pointer;
            transition: all 0.25s ease;
            font-weight: 600;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.45);
        }

        button:active {
            transform: scale(0.97);
        }

        .back-btn {
            background: #e5e7eb;
            color: #111827;
        }

        .card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            padding: 28px;
            border-radius: 20px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.12);
        }

        .input-group {
            position: relative;
            margin-bottom: 22px;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            outline: none;
        }

        .input-group input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .input-group label {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: white;
            padding: 0 6px;
            font-size: 14px;
            transition: 0.2s;
        }

        .input-group input:focus+label,
        .input-group input:not(:placeholder-shown)+label {
            top: -8px;
            font-size: 12px;
            color: #6366f1;
        }

        .eye {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
        }

        .strength-bar {
            height: 6px;
            background: #e5e7eb;
            border-radius: 6px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        #strengthFill {
            height: 100%;
            width: 0%;
            transition: 0.3s;
        }

        /* -------- 📋 RULES -------- */
        .rules p {
            font-size: 12px;
            margin: 3px 0;
            color: #dc2626;
        }

        .rules p.ok {
            color: #16a34a;
        }

        /* -------- ✔ MATCH -------- */
        .match {
            font-size: 12px;
            margin-bottom: 10px;
        }

        .match.ok {
            color: #16a34a;
        }

        .match.no {
            color: #dc2626;
        }

        /* -------- ❌ INPUT ERROR -------- */
        .input-error {
            border: 1px solid red !important;
        }

        /* -------- SUCCESS OVERLAY -------- */
        #successOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.4s;
        }

        #successOverlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .success-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
        }

        .tick {
            font-size: 40px;
            color: green;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="dashboard">

        <div class="header-actions">
            <h1>Change Password</h1>
            <button class="back-btn" id="backBtn">← Back</button>
        </div>

        <div class="card">

            <div id="messageBox" class="message-box"></div>

            <div class="input-group">
                <input type="password" id="oldPass" placeholder=" ">
                <label>Old Password</label>
            </div>

            <div class="input-group">
                <input type="password" id="newPass" placeholder=" ">
                <label>New Password</label>
                <span class="eye" id="eyeNew">👁</span>
            </div>

            <div class="strength-bar">
                <div id="strengthFill"></div>
            </div>

            <!-- RULES -->
            <div class="rules">
                <p id="ruleLen">❌ Min 4 chars</p>
                <p id="ruleUpper">❌ Uppercase</p>
                <p id="ruleNum">❌ Number</p>
                <p id="ruleSpecial">❌ Special char</p>
            </div>

            <div class="input-group">
                <input type="password" id="confirmPass" placeholder=" ">
                <label>Confirm Password</label>
                <span class="eye" id="eyeConfirm">👁</span>
            </div>

            <p id="matchText" class="match"></p>

            <button id="updateBtn">Update Password</button>

        </div>
    </div>

    <!-- SUCCESS -->
    <div id="successOverlay">
        <div class="success-box">
            <div class="tick">✔</div>
            <p>Password Updated</p>
        </div>
    </div>

    <script src="mockData.js"></script>
    <script src="change-password.js"></script>

</body>

</html>
