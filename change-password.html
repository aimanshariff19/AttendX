<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Change Password</title>

    <style>
        /* -------- 🌌 PAGE -------- */
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: linear-gradient(135deg, #5f5cff, #7c3aed);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* subtle gradient motion */
        body::before {
            content: "";
            position: fixed;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.08), transparent 60%);
            animation: floatBg 12s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes floatBg {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(-5%, -5%);
            }
        }

        /* -------- 📦 CONTAINER -------- */
        .dashboard {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* -------- 🔝 HEADER -------- */
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 20px;
            color: white;
            font-weight: 600;
        }

        /* -------- 🔘 BUTTON -------- */
        button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(.4, 0, .2, 1);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        button:active {
            transform: scale(0.97);
        }

        .back-btn {
            width: auto;
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.2);
        }

        /* -------- 🧊 CARD -------- */
        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 28px;
            border-radius: 20px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.25);

            display: flex;
            flex-direction: column;
            gap: 16px;

            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        /* -------- ✏ INPUT -------- */
        .input-group {
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 14px;
            transition: all 0.25s cubic-bezier(.4, 0, .2, 1);
        }

        /* focus */
        .input-group input:focus {
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.15);
            outline: none;
        }

        /* label */
        .input-group label {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            transition: 0.2s;
        }

        .input-group input:focus+label,
        .input-group input:not(:placeholder-shown)+label {
            top: -8px;
            font-size: 10px;
            color: white;
        }

        /* -------- 👁 -------- */
        .eye {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.7;
        }

        /* -------- 📊 STRENGTH -------- */
        .strength-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        #strengthFill {
            height: 100%;
            border-radius: 10px;
            transition: all 0.4s cubic-bezier(.4, 0, .2, 1);
        }

        /* -------- 📋 RULES -------- */
        .rules {
            background: rgba(255, 255, 255, 0.08);
            padding: 12px;
            border-radius: 12px;
        }

        .rules p {
            font-size: 12px;
            margin: 4px 0;
            color: rgba(255, 255, 255, 0.7);
        }

        .rules p::before {
            content: "✖ ";
            color: #ef4444;
        }

        .rules p.ok {
            color: #4ade80;
        }

        .rules p.ok::before {
            content: "✔ ";
        }

        /* -------- ✔ MATCH -------- */
        .match {
            font-size: 13px;
            color: #e0e7ff;
        }

        /* -------- 🔔 MESSAGE -------- */
        .message-box {
            background: rgba(255, 255, 255, 0.15);
            padding: 10px;
            border-radius: 10px;
            color: white;
        }

        /* -------- 🎉 SUCCESS -------- */
        #successOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s ease;
        }

        #successOverlay.show {
            opacity: 1;
        }

        .success-box {
            background: white;
            padding: 30px 40px;
            border-radius: 18px;
            text-align: center;
            animation: pop 0.4s cubic-bezier(.4, 0, .2, 1);
        }

        .tick {
            font-size: 36px;
            color: #22c55e;
            animation: tick 0.5s ease;
        }

        @keyframes pop {
            from {
                transform: scale(0.85);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes tick {
            0% {
                transform: scale(0);
            }

            70% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <div class="dashboard">

        <div class="header-actions">
            <h1>Change Password</h1>
            <button class="back-btn" id="backBtn">← Back</button>
        </div>

        <div class="card">

            <div id="messageBox" class="message-box"></div>

            <div class="input-group">
                <input type="password" id="oldPass" placeholder=" ">
                <label>Old Password</label>
            </div>

            <div class="input-group">
                <input type="password" id="newPass" placeholder=" ">
                <label>New Password</label>
                <span class="eye" id="eyeNew">👁</span>
            </div>

            <div class="strength-bar">
                <div id="strengthFill"></div>
            </div>

            <div class="rules">
                <p id="ruleLen">Min 4 chars</p>
                <p id="ruleUpper">Uppercase</p>
                <p id="ruleNum">Number</p>
                <p id="ruleSpecial">Special char</p>
            </div>

            <div class="input-group">
                <input type="password" id="confirmPass" placeholder=" ">
                <label>Confirm Password</label>
                <span class="eye" id="eyeConfirm">👁</span>
            </div>

            <p id="matchText" class="match"></p>

            <button id="updateBtn">Update Password</button>

        </div>

    </div>

    <div id="successOverlay">
        <div class="success-box">
            <div class="tick">✔</div>
            <p>Password Updated</p>
        </div>
    </div>

    <script src="mockData.js"></script>
    <script src="change-password.js"></script>

</body>

</html>
