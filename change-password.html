<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Change Password</title>

    <style>
        /* -------- 🌌 PAGE -------- */
        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #c7d2fe);
            min-height: 100vh;
        }

        /* -------- 📦 DASHBOARD -------- */
        .dashboard {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            animation: fadeUp 0.6s ease;
        }

        /* -------- 🔝 HEADER -------- */
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: clamp(24px, 3vw, 34px);
            font-weight: 700;
            color: #4338ca;
        }

        /* -------- 🚀 BUTTONS -------- */
        button {
            padding: 12px 18px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            cursor: pointer;
            transition: all 0.25s ease;
            font-weight: 600;
            position: relative;
            overflow: hidden;
        }

        /* Glow hover */
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.45);
        }

        /* Click feel */
        button:active {
            transform: scale(0.97);
        }

        /* Secondary */
        .back-btn {
            background: #e5e7eb;
            color: #111827;
        }

        .back-btn:hover {
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        }

        /* -------- 🧊 CARD -------- */
        .card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            padding: 28px;
            border-radius: 20px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.12);
            transition: 0.3s;
        }

        /* subtle lift */
        .card:hover {
            transform: translateY(-2px);
        }

        /* -------- 📝 INPUT -------- */
        .input-group {
            position: relative;
            margin-bottom: 22px;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            outline: none;
            transition: 0.25s;
            font-size: 14px;
        }

        /* focus glow */
        .input-group input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        /* -------- 🏷 FLOAT LABEL -------- */
        .input-group label {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: white;
            padding: 0 6px;
            font-size: 14px;
            color: #6b7280;
            transition: 0.2s ease;
        }

        .input-group input:focus+label,
        .input-group input:not(:placeholder-shown)+label {
            top: -8px;
            font-size: 12px;
            color: #6366f1;
        }

        /* -------- 👁 EYE ICON -------- */
        .eye {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            opacity: 0.6;
            transition: 0.2s;
        }

        .eye:hover {
            opacity: 1;
            transform: translateY(-50%) scale(1.1);
        }

        /* -------- 📊 PASSWORD STRENGTH -------- */
        .strength-bar {
            height: 6px;
            background: #e5e7eb;
            border-radius: 6px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        #strengthFill {
            height: 100%;
            width: 0%;
            border-radius: 6px;
            transition: 0.35s ease;
        }

        /* color states */
        .weak {
            background: #ef4444;
        }

        .medium {
            background: #f59e0b;
        }

        .strong {
            background: #22c55e;
        }

        #strengthText {
            font-size: 12px;
            margin-bottom: 12px;
            font-weight: 500;
        }

        /* -------- 🔔 MESSAGE -------- */
        .message-box {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 10px;
            display: none;
            font-size: 14px;
            animation: fadeUp 0.4s ease;
        }

        .success {
            background: #dcfce7;
            color: #166534;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
        }

        /* -------- ✨ ANIMATION -------- */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="dashboard">

        <div class="header-actions">
            <h1>Change Password</h1>
            <button class="back-btn" id="backBtn">← Back</button>
        </div>

        <div class="card">

            <div id="messageBox" class="message-box"></div>

            <div class="input-group">
                <input type="password" id="oldPass" placeholder=" ">
                <label>Old Password</label>
            </div> <br>

            <div class="input-group">
                <input type="password" id="newPass" placeholder=" ">
                <label>New Password</label>
                <span class="eye" id="eyeNew">👁</span>
            </div> <br>

            <!-- 📊 Strength -->
            <div class="strength-bar">
                <div id="strengthFill"></div>
            </div> <br>
            <p id="strengthText"></p>

            <div class="input-group">
                <input type="password" id="confirmPass" placeholder=" ">
                <label>Confirm Password</label>
                <span class="eye" id="eyeConfirm">👁</span>
            </div> <br>

            <button id="updateBtn">Update Password</button>

        </div>

    </div>

    <script src="mockData.js"></script>
    <script src="change-password.js"></script>

</body>

</html>
