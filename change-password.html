<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Change Password</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #c7d2fe);
        }

        .dashboard {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            animation: fadeUp 0.6s ease;
        }

        /* HEADER */

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: clamp(24px, 3vw, 34px);
            font-weight: 700;
            color: #4338ca;
        }

        /* BUTTON */

        button {
            padding: 10px 14px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            cursor: pointer;
            transition: 0.25s;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }

        /* 💧 RIPPLE */
        button span.ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: rippleAnim 0.6s linear;
            background: rgba(255, 255, 255, 0.6);
        }

        @keyframes rippleAnim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* 🌀 LOADING BUTTON */
        button.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        button.loading::after {
            content: "";
            width: 18px;
            height: 18px;
            border: 3px solid white;
            border-top: 3px solid transparent;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        .back-btn {
            background: #e5e7eb;
            color: #111827;
        }

        .back-btn:hover {
            background: #d1d5db;
            box-shadow: none;
        }

        /* CARD */

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            animation: fadeUp 0.8s ease;
        }

        /* INPUTS */

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0 15px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            font-size: 14px;
            box-sizing: border-box;
            transition: 0.25s;
        }

        input:focus {
            border-color: #6366f1;
            outline: none;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
            transform: scale(1.01);
        }

        /* MESSAGE */

        .message-box {
            margin-bottom: 10px;
            padding: 12px;
            border-radius: 10px;
            display: none;
            font-weight: 500;
            animation: fadeUp 0.4s ease;
        }

        .message-box.success {
            background: #dcfce7;
            color: #166534;
        }

        .message-box.error {
            background: #fee2e2;
            color: #991b1b;
        }

        /* PAGE EXIT */

        .page-exit {
            animation: pageOut 0.5s ease forwards;
        }

        @keyframes pageOut {
            to {
                opacity: 0;
                transform: translateY(-30px);
            }
        }

        /* ENTRY */

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-6px);
            }

            50% {
                transform: translateX(6px);
            }

            75% {
                transform: translateX(-6px);
            }

            100% {
                transform: translateX(0);
            }
        }
    </style>

</head>

<body>

    <div class="dashboard">

        <div class="header-actions">
            <h1>AttendX / Change Password</h1>
            <button class="back-btn" onclick="goBack()">← Go Back</button>
        </div>

        <div class="card">

            <div id="messageBox" class="message-box"></div>

            <p><strong>Old Password</strong></p>
            <input type="password" id="oldPass">

            <p><strong>New Password</strong></p>
            <input type="password" id="newPass">

            <p><strong>Confirm Password</strong></p>
            <input type="password" id="confirmPass">

            <button id="updateBtn" onclick="updatePassword()">Update Password</button>

        </div>

    </div>

    <script src="mockData.js"></script>
    <script src="change-password.js"></script>

</body>

</html>
