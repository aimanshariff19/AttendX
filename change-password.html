<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Change Password</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #c7d2fe);
        }

        .dashboard {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }

        /* HEADER */

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: clamp(24px, 3vw, 34px);
            font-weight: 700;
            color: #4338ca;
        }

        /* BUTTON */

        button {
            padding: 10px 14px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            cursor: pointer;
            transition: 0.25s;
            font-weight: 500;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(99, 102, 241, 0.4);
        }

        .back-btn {
            background: #e5e7eb;
            color: #111827;
        }

        .back-btn:hover {
            background: #d1d5db;
            box-shadow: none;
        }

        /* CARD */

        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }

        /* INPUTS */

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0 15px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            font-size: 14px;
            box-sizing: border-box;
            transition: 0.2s;
        }

        input:focus {
            border-color: #6366f1;
            outline: none;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        /* MESSAGE */

        .message-box {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 8px;
            display: none;
            font-weight: 500;
        }

        .message-box.success {
            background: #dcfce7;
            color: #166534;
        }

        .message-box.error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>

</head>

<body>

    <div class="dashboard">

        <div class="header-actions">
            <h1>AttendX / Change Password</h1>
            <button class="back-btn" onclick="goBack()">← Go Back</button>
        </div>

        <div class="card">

            <div id="messageBox" class="message-box"></div>

            <p><strong>Old Password</strong></p>
            <input type="password" id="oldPass">

            <p><strong>New Password</strong></p>
            <input type="password" id="newPass">

            <p><strong>Confirm Password</strong></p>
            <input type="password" id="confirmPass">

            <button onclick="updatePassword()">Update Password</button>

        </div>

    </div>

    <script src="mockData.js"></script>
    <script src="change-password.js"></script>

</body>

</html>
