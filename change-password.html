<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Change Password</title>

    <style>
        /* -------- 🌌 PAGE -------- */
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* -------- 📦 CONTAINER -------- */
        .dashboard {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        /* -------- 🧊 CARD -------- */
        .card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 28px;
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);

            /* 🔥 THIS FIXES EVERYTHING */
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* -------- 🔝 HEADER -------- */
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 20px;
            color: white;
            font-weight: 600;
        }

        /* -------- 🔘 BUTTON -------- */
        button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .back-btn {
            width: auto;
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.2);
        }

        /* -------- ✏ INPUT (FIXED) -------- */
        .input-group {
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 14px 14px;
            border-radius: 10px;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 14px;
            transition: 0.2s;
        }

        .input-group input:focus {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.15);
            outline: none;
        }

        /* label */
        .input-group label {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            transition: 0.2s;
        }

        .input-group input:focus+label,
        .input-group input:not(:placeholder-shown)+label {
            top: -8px;
            font-size: 10px;
            color: #fff;
        }

        /* -------- 👁 -------- */
        .eye {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            opacity: 0.7;
        }

        /* -------- 📊 BAR -------- */
        .strength-bar {
            height: 5px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        #strengthFill {
            height: 100%;
            border-radius: 10px;
            transition: 0.3s;
        }

        /* -------- 📋 RULES (FIXED BIG TIME) -------- */
        .rules {
            background: rgba(255, 255, 255, 0.08);
            padding: 12px;
            border-radius: 10px;
        }

        .rules p {
            font-size: 12px;
            margin: 4px 0;
            color: rgba(255, 255, 255, 0.7);
        }

        .rules p.ok {
            color: #4ade80;
        }

        /* -------- ✔ MATCH -------- */
        .match {
            font-size: 12px;
            font-weight: 500;
            color: #e0e7ff;
        }

        /* -------- 🔔 MESSAGE -------- */
        .message-box {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="dashboard">

        <div class="header-actions">
            <h1>Change Password</h1>
            <button class="back-btn" id="backBtn">← Back</button>
        </div>

        <div class="card">

            <div id="messageBox" class="message-box"></div>

            <div class="input-group">
                <input type="password" id="oldPass" placeholder=" ">
                <label>Old Password</label>
            </div>

            <div class="input-group">
                <input type="password" id="newPass" placeholder=" ">
                <label>New Password</label>
                <span class="eye" id="eyeNew">👁</span>
            </div>

            <div class="strength-bar">
                <div id="strengthFill"></div>
            </div>

            <!-- RULES -->
            <div class="rules">
                <p id="ruleLen">❌ Min 4 chars</p>
                <p id="ruleUpper">❌ Uppercase</p>
                <p id="ruleNum">❌ Number</p>
                <p id="ruleSpecial">❌ Special char</p>
            </div>

            <div class="input-group">
                <input type="password" id="confirmPass" placeholder=" ">
                <label>Confirm Password</label>
                <span class="eye" id="eyeConfirm">👁</span>
            </div>

            <p id="matchText" class="match"></p>

            <button id="updateBtn">Update Password</button>

        </div>
    </div>

    <!-- SUCCESS -->
    <div id="successOverlay">
        <div class="success-box">
            <div class="tick">✔</div>
            <p>Password Updated</p>
        </div>
    </div>

    <script src="mockData.js"></script>
    <script src="change-password.js"></script>

</body>

</html>
