<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Change Password</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #c7d2fe);
        }

        .dashboard {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            animation: fadeUp 0.6s ease;
        }

        /* HEADER */

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: clamp(24px, 3vw, 34px);
            font-weight: 700;
            color: #4338ca;
        }

        /* BUTTON */

        button {
            padding: 12px 16px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            cursor: pointer;
            transition: 0.25s;
            font-weight: 600;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }

        .back-btn {
            background: #e5e7eb;
            color: #111827;
        }

        .back-btn:hover {
            background: #d1d5db;
            box-shadow: none;
        }

        /* CARD */

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            padding: 26px;
            border-radius: 18px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
            animation: fadeUp 0.8s ease;
        }

        /* FLOATING INPUT */

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            font-size: 14px;
            outline: none;
            transition: 0.25s;
        }

        .input-group label {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: white;
            padding: 0 6px;
            color: #6b7280;
            transition: 0.2s;
            pointer-events: none;
        }

        .input-group input:focus + label,
        .input-group input:not(:placeholder-shown) + label {
            top: -8px;
            font-size: 12px;
            color: #6366f1;
        }

        .input-group input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        /* MESSAGE */

        .message-box {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 10px;
            display: none;
            font-weight: 500;
            animation: fadeUp 0.4s ease;
        }

        .success {
            background: #dcfce7;
            color: #166534;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
        }

        /* LOADING */

        button.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        button.loading::after {
            content: "";
            width: 18px;
            height: 18px;
            border: 3px solid white;
            border-top: 3px solid transparent;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            50% { transform: translateX(6px); }
            75% { transform: translateX(-6px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>

<body>

    <div class="dashboard">

        <div class="header-actions">
            <h1>Change Password</h1>
            <button class="back-btn" id="backBtn">← Back</button>
        </div>

        <div class="card">

            <div id="messageBox" class="message-box"></div>

            <div class="input-group">
                <input type="password" id="oldPass" placeholder=" ">
                <label>Old Password</label>
            </div>

            <div class="input-group">
                <input type="password" id="newPass" placeholder=" ">
                <label>New Password</label>
            </div>

            <div class="input-group">
                <input type="password" id="confirmPass" placeholder=" ">
                <label>Confirm Password</label>
            </div>

            <button id="updateBtn">Update Password</button>

        </div>

    </div>

    <script src="mockData.js"></script>
    <script src="change-password.js"></script>

</body>

</html>
